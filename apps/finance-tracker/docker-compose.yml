# finance-tracker is self-contained: it ships its OWN PocketBase container
# (the deploy box has no shared PocketBase — each app brings its own, like
# habit-tracker and dutch-app). The two services talk over a private bridge
# network (finance-net); only the host port mappings are exposed.
#
# Schema is a set of JS migration files under server/pb-schema/migrations/,
# mounted read-only into the PocketBase container and auto-applied on `serve`
# boot (see server/pb-schema/README.md). No curl seeding needed.
services:
  finance-pocketbase:
    build:
      context: ./pb
    ports:
      # 8090/8091 are taken by other apps' PocketBase on the deploy box.
      - "8092:8090"
    volumes:
      # Persistent DB + uploads.
      - finance_pb_data:/pb/pb_data
      # Our schema migrations, auto-applied on boot.
      - ./server/pb-schema/migrations:/pb/pb_migrations:ro
    environment:
      # start.sh upserts this superuser; the BFF authenticates as it.
      - PB_EMAIL=${PB_ADMIN_EMAIL}
      - PB_PASSWORD=${PB_ADMIN_PASSWORD}
    restart: unless-stopped
    networks:
      - finance-net

  finance-tracker:
    build:
      context: ../..
      dockerfile: apps/finance-tracker/Dockerfile
      args:
        # Build-time VITE_* vars (Vite inlines them into the SPA bundle). These
        # come from .env via shell interpolation; keep in sync with the ARGs in
        # the Dockerfile and the WEB section of .env.example. Optional ones
        # (storage bucket, messaging sender, API base URL, Sentry DSN) may be
        # empty.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    ports:
      - "3110:80"
    env_file:
      - .env
    depends_on:
      - finance-pocketbase
    restart: unless-stopped
    networks:
      - finance-net

networks:
  finance-net:
    driver: bridge

volumes:
  finance_pb_data:
