# PocketBase note: finance-tracker has NO PocketBase service of its own — it
# shares the workspace-wide PocketBase that habit-tracker operates. Our schema
# is a set of JS migration files under server/pb-schema/migrations/ that
# PocketBase auto-applies on boot (see server/pb-schema/README.md).
#
# IN PRODUCTION: whichever PocketBase container runs on the Mac Mini must mount
# our migrations directory into its --migrationsDir so our 8 collections get
# created alongside habit-tracker's. Add to that container's service:
#
#   volumes:
#     - ../finance-tracker/server/pb-schema/migrations:/pb/pb_migrations:ro
#
# (adjust the host path to wherever this repo is checked out on the Mac Mini).
services:
  finance-tracker:
    build:
      context: ../..
      dockerfile: apps/finance-tracker/Dockerfile
      args:
        # Build-time VITE_* vars (Vite inlines them into the SPA bundle). These
        # come from .env via shell interpolation; keep in sync with the ARGs in
        # the Dockerfile and the WEB section of .env.example. Optional ones
        # (storage bucket, messaging sender, API base URL, Sentry DSN) may be
        # empty.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    ports:
      - "3110:80"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mac-mini-net
networks:
  mac-mini-net:
    external: true
